<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | CineVerse</title>

<link rel="stylesheet"
href="login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>

🎬 CineVerse

</h1>

<p>

Book Movie Tickets Anytime.

Anywhere.

</p>

</div>

<div class="right">

<form id="loginForm">

<h2>

Welcome Back

</h2>

<div class="inputBox">

<i class="fa fa-envelope"></i>

<input

type="email"

id="email"

placeholder="Email"

required>

</div>

<div class="inputBox">

<i class="fa fa-lock"></i>

<input

type="password"

id="password"

placeholder="Password"

required>

</div>

<button>

Login

</button>

<p>

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</form>

</div>

</div>

<script src="login.js"></script>

</body>

</html>
